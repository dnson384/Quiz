services:
  db:
    image: postgres:16
    container_name: db_postgres16
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./server
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/app/public/avatars:/app/app/public/avatars
    env_file:
      - ./server/.env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432

  frontend:
    build: ./ui
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - ./ui/.env
    environment:
      - BACKEND_URL=http://backend:8000/api

volumes:
  postgres_data:
